<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Магазин доната — DarkRP Garry's Mod</title>
    <!-- Подключаем иконки Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0e0e10;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
        }

        /* Декоративный фон */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(20, 60, 120, 0.25), transparent 60%),
                        radial-gradient(circle at 70% 70%, rgba(120, 30, 90, 0.2), transparent 70%);
            z-index: -2;
        }

        .container {
            max-width: 1300px;
            width: 100%;
        }

        /* Шапка */
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(255, 210, 0, 0.3);
            letter-spacing: 2px;
        }

        .header p {
            color: #a0a0b0;
            margin-top: 0.5rem;
            font-size: 1.2rem;
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background: rgba(20, 22, 30, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2rem 1.5rem 1.5rem;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.4s ease, border-color 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -8px rgba(0,0,0,0.5);
        }

        .product-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 20px 35px -10px rgba(255, 200, 0, 0.3);
        }

        .icon-wrapper {
            font-size: 3.5rem;
            margin-bottom: 1.2rem;
            color: #f0b90b;
            filter: drop-shadow(0 0 12px rgba(240, 185, 11, 0.6));
        }

        .product-title {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            color: #fff;
        }

        .product-role {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 1.2rem;
        }

        .product-desc {
            color: #b0b0c0;
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
            flex: 1;
        }

        .price {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffd966;
            margin-bottom: 1.5rem;
        }

        .price span {
            font-size: 1rem;
            font-weight: 400;
            color: #8a8a9a;
        }

        .btn-add {
            background: linear-gradient(145deg, #2a2a35, #1a1a25);
            border: 1px solid #f0b90b;
            color: #ffd966;
            padding: 0.9rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .btn-add:hover {
            background: #f0b90b;
            color: #0e0e10;
            box-shadow: 0 0 20px #f0b90b88;
            border-color: #f0b90b;
        }

        /* Корзина (иконка-триггер) */
        .cart-icon-container {
            position: fixed;
            top: 25px;
            right: 30px;
            z-index: 100;
            cursor: pointer;
            background: rgba(20, 22, 30, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #ffd966;
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
            transition: 0.3s;
        }

        .cart-icon-container:hover {
            background: #f0b90b;
            color: #0e0e10;
        }

        #cartCount {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #e03a4e;
            color: white;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #0e0e10;
        }

        /* Сайдбар корзины */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -450px;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: rgba(10, 12, 18, 0.95);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
            z-index: 200;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            color: #e0e0e0;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .cart-header h2 {
            font-size: 1.8rem;
            color: #ffd966;
        }

        .close-cart {
            background: none;
            border: none;
            color: #aaa;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-cart:hover {
            color: #ff5555;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            border-left: 3px solid #f0b90b;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-title {
            font-weight: 700;
            color: #fff;
        }

        .cart-item-price {
            color: #ffd966;
            font-size: 0.9rem;
        }

        .remove-item {
            background: none;
            border: none;
            color: #e03a4e;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .remove-item:hover {
            color: #ff5e5e;
            transform: scale(1.2);
        }

        .cart-footer {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 1.5rem;
        }

        .total {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        .total span:last-child {
            color: #f0b90b;
        }

        .input-field {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-field:focus {
            border-color: #f0b90b;
            box-shadow: 0 0 12px rgba(240,185,11,0.3);
        }

        .btn-checkout {
            width: 100%;
            background: #f0b90b;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #0e0e10;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .btn-checkout:hover {
            background: #ffd966;
            box-shadow: 0 0 25px #f0b90b;
        }

        .empty-cart-message {
            text-align: center;
            color: #777;
            margin-top: 2rem;
        }

        /* Адаптация */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2.2rem;
            }
            .cart-sidebar {
                width: 100%;
                right: -100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔥 DARK CITY ROLEPLAY</h1>
            <p>Выбери привилегию и управляй сервером</p>
        </div>

        <div class="products-grid" id="productsGrid">
            <!-- Карточки генерируются JS, но можно и статично -->
        </div>
    </div>

    <!-- Иконка корзины -->
    <div class="cart-icon-container" id="cartIcon">
        <i class="fas fa-shopping-cart"></i>
        <span id="cartCount">0</span>
    </div>

    <!-- Оверлей для закрытия корзины -->
    <div class="overlay" id="overlay"></div>

    <!-- Боковая панель корзины -->
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2><i class="fas fa-shopping-bag"></i> Корзина</h2>
            <button class="close-cart" id="closeCartBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items" id="cartItems">
            <p class="empty-cart-message">Тут пока пусто</p>
        </div>
        <div class="cart-footer">
            <div class="total">
                <span>Итого:</span>
                <span id="totalPrice">0 ₽</span>
            </div>
            <input type="text" class="input-field" id="nicknameInput" placeholder="Ваш никнейм в игре" autocomplete="off">
            <input type="text" class="input-field" id="serverInput" placeholder="Сервер (например, DarkRP #1)" autocomplete="off">
            <button class="btn-checkout" id="checkoutBtn"><i class="fas fa-credit-card"></i> Оплатить</button>
        </div>
    </div>

    <script>
        (function() {
            // --- Товары (можно менять цены, названия, иконки) ---
            const products = [
                {
                    id: 'helper',
                    name: 'Хелпер',
                    role: 'Helper',
                    price: 250,
                    icon: 'fa-solid fa-handshake-angle',
                    desc: 'Помощь игрокам, доступ к командам помощи, выделение в чате.'
                },
                {
                    id: 'moderator',
                    name: 'Модератор',
                    role: 'Moderator',
                    price: 590,
                    icon: 'fa-solid fa-gavel',
                    desc: 'Кик, мут, бан, управление чатом, расширенные права.'
                },
                {
                    id: 'admin',
                    name: 'Админ',
                    role: 'Admin',
                    price: 1200,
                    icon: 'fa-solid fa-user-shield',
                    desc: 'Полный контроль: варны, баны, настройка сервера, спавн предметов.'
                },
                {
                    id: 'superadmin',
                    name: 'Супер Админ',
                    role: 'Super Admin',
                    price: 2500,
                    icon: 'fa-solid fa-crown',
                    desc: 'Абсолютные права, доступ к консоли, управление модерацией.'
                }
            ];

            // --- Состояние корзины ---
            let cart = [];

            // --- DOM элементы ---
            const productsGrid = document.getElementById('productsGrid');
            const cartIcon = document.getElementById('cartIcon');
            const cartSidebar = document.getElementById('cartSidebar');
            const overlay = document.getElementById('overlay');
            const closeCartBtn = document.getElementById('closeCartBtn');
            const cartItemsContainer = document.getElementById('cartItems');
            const totalPriceEl = document.getElementById('totalPrice');
            const cartCountEl = document.getElementById('cartCount');
            const nicknameInput = document.getElementById('nicknameInput');
            const serverInput = document.getElementById('serverInput');
            const checkoutBtn = document.getElementById('checkoutBtn');

            // --- Функции отрисовки ---
            function renderProducts() {
                productsGrid.innerHTML = products.map(product => `
                    <div class="product-card">
                        <div class="icon-wrapper">
                            <i class="${product.icon}"></i>
                        </div>
                        <div class="product-title">${product.name}</div>
                        <div class="product-role">${product.role}</div>
                        <div class="product-desc">${product.desc}</div>
                        <div class="price">${product.price} <span>₽</span></div>
                        <button class="btn-add" data-id="${product.id}">
                            <i class="fas fa-cart-plus"></i> В корзину
                        </button>
                    </div>
                `).join('');

                // Навешиваем обработчики на кнопки "В корзину"
                document.querySelectorAll('.btn-add').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        addToCart(id);
                    });
                });
            }

            function addToCart(productId) {
                const product = products.find(p => p.id === productId);
                if (!product) return;
                
                // Проверяем, нет ли уже такого же товара (можно добавить несколько одинаковых ролей,
                // но для удобства предупредим; по желанию можно разрешить дубли)
                const existing = cart.find(item => item.id === productId);
                if (existing) {
                    // Увеличиваем количество или просто выводим сообщение? 
                    // По условию задачи вероятно покупка одной роли, но оставим возможность докупить.
                    // Увеличим количество.
                    existing.quantity += 1;
                } else {
                    cart.push({
                        ...product,
                        quantity: 1
                    });
                }
                
                updateCartUI();
                // Небольшая анимация иконки корзины
                cartIcon.style.transform = 'scale(1.1)';
                setTimeout(() => { cartIcon.style.transform = 'scale(1)'; }, 200);
                
                // Показываем сайдбар ненадолго (опционально)
                // openCart();
            }

            function removeFromCart(productId) {
                cart = cart.filter(item => item.id !== productId);
                updateCartUI();
            }

            function updateCartUI() {
                // Обновляем счетчик
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartCountEl.textContent = totalItems;

                // Обновляем список в корзине
                if (cart.length === 0) {
                    cartItemsContainer.innerHTML = '<p class="empty-cart-message">Тут пока пусто</p>';
                } else {
                    cartItemsContainer.innerHTML = cart.map(item => `
                        <div class="cart-item">
                            <div class="cart-item-info">
                                <span class="cart-item-title">${item.name} ${item.quantity > 1 ? `(x${item.quantity})` : ''}</span>
                                <span class="cart-item-price">${item.price * item.quantity} ₽</span>
                            </div>
                            <button class="remove-item" data-id="${item.id}">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    `).join('');

                    // Навешиваем удаление
                    document.querySelectorAll('.remove-item').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const id = e.currentTarget.getAttribute('data-id');
                            removeFromCart(id);
                        });
                    });
                }

                // Общая сумма
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                totalPriceEl.textContent = total + ' ₽';
            }

            function openCart() {
                cartSidebar.classList.add('open');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }

            function closeCart() {
                cartSidebar.classList.remove('open');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            // --- Обработчики событий ---
            cartIcon.addEventListener('click', openCart);
            closeCartBtn.addEventListener('click', closeCart);
            overlay.addEventListener('click', closeCart);

            // Закрытие по Escape
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && cartSidebar.classList.contains('open')) {
                    closeCart();
                }
            });

            // Оформление заказа
            checkoutBtn.addEventListener('click', () => {
                if (cart.length === 0) {
                    alert('Корзина пуста. Добавьте привилегии.');
                    return;
                }
                
                const nickname = nicknameInput.value.trim();
                if (!nickname) {
                    alert('Пожалуйста, укажите ваш никнейм в игре.');
                    nicknameInput.focus();
                    return;
                }

                const server = serverInput.value.trim() || 'Основной сервер';
                
                // Формируем описание заказа для имитации отправки
                const orderDetails = cart.map(item => 
                    `${item.name} (${item.role}) x${item.quantity} - ${item.price * item.quantity}₽`
                ).join('\n');
                
                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                
                // В реальном проекте здесь будет редирект на платёжный шлюз (например, Qiwi, ЮKassa, PayPal)
                // А пока показаем модальное окно с информацией и "эмуляцией" перехода.
                const confirmMessage = `🎮 Заказ для игрока: ${nickname}\n🌐 Сервер: ${server}\n\n${orderDetails}\n\n💰 Итого к оплате: ${total} ₽\n\n(В реальной версии вы будете перенаправлены на платёжную систему)`;
                
                // Имитируем переход на оплату (можно заменить на window.location.href)
                if (confirm(confirmMessage + '\n\nПерейти к оплате (демо)?')) {
                    alert('✅ Демо-оплата прошла успешно! Спасибо за покупку.\nРоль будет выдана в ближайшее время.');
                    // Очищаем корзину после успешной "оплаты"
                    cart = [];
                    nicknameInput.value = '';
                    serverInput.value = '';
                    updateCartUI();
                    closeCart();
                }
            });

            // Инициализация
            renderProducts();
            updateCartUI();
        })();
    </script>
</body>
</html>
